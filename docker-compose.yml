# ============================================================
# geo-editor — Docker Compose
#
# Shared Libraries Strategy:
#   ✓ design-tokens    → Copied in build stage (CSS custom properties)
#   ✓ ui-react         → Copied in react-app build stage
#   ✓ ui-angular       → Copied in angular-app build stage
#   ✓ core             → Compiled & bundled in build stage (immutable runtime)
#
# Each app is built independently with all dependencies included.
# No runtime changes to source code; config via environment variables.
# ============================================================

services:
  # ── Angular App ─────────────────────────────────────────
  # Builds design-system-angular + core + design-tokens statically
  angular-client:
    build:
      context: .
      dockerfile: apps/angular-app/Dockerfile
    container_name: geo-editor-angular
    ports:
      - "${ANGULAR_PORT:-4200}:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - geo-net
    labels:
      - "com.example.description=Angular POI Editor Client"

  # ── React App ───────────────────────────────────────────
  # Builds design-system-react + core + design-tokens statically
  react-client:
    build:
      context: .
      dockerfile: apps/react-app/Dockerfile
    container_name: geo-editor-react
    ports:
      - "${REACT_PORT:-3000}:80"
    environment:
      - NODE_ENV=production
      - VITE_TILE_URL=${VITE_TILE_URL:-https://tile.openstreetmap.org/{z}/{x}/{y}.png}
      - VITE_STORAGE_KEY=${VITE_STORAGE_KEY:-poi_editor_state}
    restart: unless-stopped
    networks:
      - geo-net
    labels:
      - "com.example.description=React POI Editor Client"

  # ── Lighthouse CI (optional) ────────────────────────────
  # lighthouse:
  #   image: patrickhulce/lhci-client:latest
  #   depends_on: [angular-client, react-client]
  #   command: ["lhci", "autorun"]
  #   volumes:
  #     - ./lighthouse-results:/app/lighthouse-results
  #   networks:
  #     - geo-net

networks:
  geo-net:
    driver: bridge
