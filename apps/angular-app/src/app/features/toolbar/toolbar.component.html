<div class="toolbar">
  <label class="btn btn-primary" for="file-input">
    📂 Importar GeoJSON
  </label>
  <input
    id="file-input"
    type="file"
    accept=".geojson,.json"
    (change)="onFileSelected($event)"
    hidden
  />

  <button class="btn btn-secondary" (click)="onExport()">
    💾 Exportar GeoJSON
  </button>

  <!-- Undo / Redo -->
  <button
    class="btn btn-secondary"
    (click)="poiSvc.undo()"
    [disabled]="!poiSvc.canUndo()"
    title="Deshacer (Ctrl+Z)">
    ↩ Deshacer
  </button>
  <button
    class="btn btn-secondary"
    (click)="poiSvc.redo()"
    [disabled]="!poiSvc.canRedo()"
    title="Rehacer (Ctrl+Y)">
    ↪ Rehacer
  </button>

  <button class="btn btn-danger" (click)="onClear()">
    🗑 Limpiar todo
  </button>
</div>
