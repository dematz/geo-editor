<div class="app-shell">
  <ds-top-bar
    [search]="search()"
    (searchChange)="onSearchChange($event)"
    [canUndo]="poiSvc.canUndo()"
    [canRedo]="poiSvc.canRedo()"
    (undo)="onUndo()"
    (redo)="onRedo()"
    (clearAll)="onClearAll()"
    (import)="onImport($event)"
    (export)="onExport()"
  />

  <app-import-report
    [result]="importResult()"
    (dismissed)="onImportReportDismissed()"
  />

  <div class="app-body">
    <ds-sidebar
      [pois]="mappedPois()"
      [categories]="SIDEBAR_CATEGORIES"
      [collapsed]="sidebarCollapsed()"
      (toggle)="toggleSidebar()"
      (new)="onNewPoi()"
      (edit)="onEditById($event)"
      (delete)="onDeletePoi($event)"
      (focus)="onFocusPoi($event)"
    />
    <app-map class="app-map" (mapClick)="onMapClick($event)" />
  </div>

  <ds-poi-form-modal
    [open]="showForm()"
    [initialData]="modalInitialData()"
    (close)="onModalClose()"
    (save)="onModalSave($event)"
  />
</div>
