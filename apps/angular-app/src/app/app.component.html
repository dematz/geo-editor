<div class="app-layout">

  <!-- Top toolbar -->
  <app-toolbar
    class="app-layout__toolbar"
    (importDone)="onImportDone($event)"
  />

  <!-- Import report banner -->
  <app-import-report
    [result]="importResult()"
    (dismissed)="onImportReportDismissed()"
  />

  <!-- Main content: map + sidebar -->
  <div class="app-layout__body">

    <!-- Map — ahora emite (mapClick) al padre -->
    <app-map
      class="app-layout__map"
      (mapClick)="onMapClick($event)"
    />

    <!-- Right sidebar -->
    <aside class="app-layout__sidebar">

      <!-- POI list -->
      <app-poi-list
        (editRequest)="onEditRequest($event)"
      />

      <!-- POI form (create / edit) -->
      @if (showForm()) {
        <app-poi-form
          [poi]="editingPoi()"
          [coords]="pendingCoords()"
          (saved)="onFormSaved($event)"
          (cancelled)="onFormCancelled()"
        />
      }

    </aside>
  </div>

</div>
