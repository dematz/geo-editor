ci:
  collect:
    url:
      - http://localhost:4200
      - http://localhost:3001
    numberOfRuns: 3
  assert:
    assertions:
      first-contentful-paint:      ['warn', { maxNumericValue: 3000 }]
      interactive:                 ['warn', { maxNumericValue: 6000 }]
      'categories:accessibility':  ['warn', { minScore: 0.8 }]
      'categories:best-practices': ['warn', { minScore: 0.8 }]
  upload:
    target: filesystem
    outputDir: ./lighthouse-results
