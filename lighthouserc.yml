ci:
  collect:
    url:
      - http://localhost:4200
      - http://localhost:3001
    numberOfRuns: 3
  assert:
    assertions:
      first-contentful-paint:  ['warn',  { maxNumericValue: 2000 }]
      interactive:             ['warn',  { maxNumericValue: 4000 }]
      accessibility:           ['warn',  { minScore: 0.8 }]
      best-practices:          ['warn',  { minScore: 0.9 }]
  upload:
    target: filesystem
    outputDir: ./lighthouse-results
